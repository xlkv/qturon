name: turon_suv
description: "Turon Suv — toza suv yetkazib berish kompaniyasi uchun kolodets/turba boshqaruv ilovasi."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Immutable models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.7
  cloud_functions: ^5.1.5

  # Map (flutter_map + Yandex tile servers — Windows + Android + iOS)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Local storage
  # Note: flutter_secure_storage Windows'da C++ ATL talab qiladi — shu sababli shared_preferences.
  # Pass-key 6 xonali PIN, foydalanuvchi o'zi biladi — high-security saqlash shart emas.
  # Real himoya — Firebase custom token (Cloud Function tomonida).
  shared_preferences: ^2.3.3

  # Image
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1

  # Logging
  logger: ^2.5.0

  # Utilities
  intl: ^0.20.1
  uuid: ^4.5.1
  package_info_plus: ^8.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.5
  freezed: ^3.0.0
  json_serializable: ^6.9.0

  # Test
  mocktail: ^1.0.4

dependency_overrides:
  analyzer_plugin: ^0.13.4

flutter:
  uses-material-design: true
